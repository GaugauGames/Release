name: IndexNow Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v39

      - name: Notify IndexNow
        run: |
          KEY="9f8154ce084b4b55802083b2179314d2"
          KEY_URL="https://gaurin.netlify.app/${KEY}.txt"
          HOST="gaurin.netlify.app"

          URLS=""
          for file in ${{ steps.changes.outputs.all_changed_files }}; do
            if [[ "$file" == *.html ]]; then
              URLS="$URLS \"https://gaurin.netlify.app/$file\","
            fi
          done

          if [ -z "$URLS" ]; then
            echo "No HTML changes. Skipping IndexNow."
            exit 0
          fi

          # JSONテンプレートを安全に生成
          JSON=$(cat <<'EOF'
{
  "host": "HOST_REPLACE",
  "key": "KEY_REPLACE",
  "keyLocation": "KEY_URL_REPLACE",
  "urlList": [URLS_REPLACE]
}
EOF
)

          # プレースホルダ置換
          JSON="${JSON/HOST_REPLACE/$HOST}"
          JSON="${JSON/KEY_REPLACE/$KEY}"
          JSON="${JSON/KEY_URL_REPLACE/$KEY_URL}"
          JSON="${JSON/URLS_REPLACE/${URLS%?}}"

          echo "Sending IndexNow notification..."
          echo "$JSON"

          for i in 1 2 3; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST -H "Content-Type: application/json" \
              -d "$JSON" https://api.indexnow.org/IndexNow)

            if [ "$RESPONSE" = "200" ]; then
              echo "IndexNow notification succeeded."
              exit 0
            else
              echo "Attempt $i failed (HTTP $RESPONSE). Retrying..."
              sleep $((2 ** i))
            fi
          done

          echo "IndexNow notification failed after 3 attempts."
          exit 1
