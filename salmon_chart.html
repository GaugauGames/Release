<!doctype html>
<html lang="ja">
<HEAD>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta name="keywords" content="スプラトゥーン3,Splatoon3,サーモンランNW,サモラン,サモランチャート">
	<meta name="description" content="サーモンランのオオモノ討伐数を記録・可視化します。">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link href="https://use.fontawesome.com/releases/v6.5.1/css/all.css" rel="stylesheet">
	<link rel="stylesheet" href="./css/mainstyle.css" type="text/css">
	<link rel="stylesheet" href="./css/chartstyle.css" type="text/css">
	<style>
		body { background:#c54b22 url(./img/logo_salmon.png) no-repeat 50% 10% fixed; }
	</style>

	<title>サモランチャート</title>
</HEAD>
<BODY>
	<main class="container">
	<h3 class="page_title">サモランチャート</h3>

	<div class="accordion-item">
		<div class="accordion-header" id="setting">
			<button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#setting_body" aria-expanded="true" aria-controls="setting_body">
			入力 >>
			</button>
		</div>
		<div id="setting_body" class="accordion-collapse collapse show" aria-labelledby="setting">
			<div class="accordion-body">
				<p class="note">
				オオモノシャケの討伐数をレーダーチャートに表します。<br>
				オオモノシャケに加え、オカシラシャケ、金イクラ納品数を過去10件まで記録し、増分を見れます。
				記録したい日付とその時の討伐数等を入力してください。</p>
				<br>
				<div class="date-row">
					<label class="date-field">
						<div class="row">
							<div class="col-2" align="right">
								日付
							</div>
							<div class="col-6">
								<input type="date" id="recordDate" />
							</div>
							<div class="col-2"></div>
						</div>
					</label>
				</div>

				<section class="input-section">
					オオモノシャケ
					<div class="metric-grid" id="bossInputs"></div>
				</section>

				<section class="input-section">
					オカシラ 金イクラ
					<div class="metric-grid" id="extraInputs"></div>
				</section>
				<br>

				<!--div class="button-stack"-->
				<div class="row">
					<div class="col-4">
						<button id="saveHistoryBtn" class="btn btn-ghost">保存</button>
					</div>
					<div class="col-4">
						<button id="clearHistoryBtn" class="btn btn-ghost">履歴削除</button>
					</div>
					<div class="col-4">
						<button id="resetBtn" class="btn btn-ghost">入力値0</button>
					</div>
				</div>
				<!--/div-->

			</div>
		</div>
	</div>

	<!-- div class="row">
		<div class="col-6"></div>
		<div class="col-6">
			<div align="right">
				<button type="button" class="btn btn-dark btn-sm" onClick="result_twitter1()"><i class="fab fa-x-twitter"></i></button> 
				<button type="button" class="btn btn-success btn-sm" onClick="result_line1()"><i class="fab fa-line"></i></button> 
			</div>
		</div>
	</div -->
	
	<section class="panel output-panel">
		<div class="canvas-card">
			<canvas id="mainChart" width="1200" height="1580"></canvas>
		</div>
	</section>

	<div align="right">
		<button id="saveImageBtn" class="btn btn-outline-light btn-sm">画像保存</button>
		結果を投稿：
		<button type="button" class="btn btn-dark btn-sm" onClick="result_twitter2()"><i class="fab fa-x-twitter"></i></button> 
		<button type="button" class="btn btn-success btn-sm" onClick="result_line2()"><i class="fab fa-line"></i></button> 
		<input type="button" class="btn btn-outline-light btn-sm" value="コピー" onClick="result_copy()">
	</div>

	<section class="panel history-panel">
		<div class="history-header">
			<h2>履歴（最大10件・日付順）</h2>
			<label class="history-filter">
				<span>折れ線グラフ対象</span>
				<select id="historyMetricSelect"></select>
			</label>
		</div>

		<div class="history-layout">
			<div class="history-list-wrap">
				<div id="historyList"></div>
			</div>
			<div class="history-chart-wrap">
				<canvas id="historyChart" width="920" height="360"></canvas>
			</div>
		</div>
	</section>

	<BR>
	<table class="table table-dark table-striped">
		<thead><tr><td class="td_nowrap">更新日</td><td>内容</td></tr></thead>
		<tbody>
		<tr><td>2026/6/20</td>
			<td>新規作成</td>
		</tr>
		</tbody>
	</table>
	<BR>
	<BR>
	<BR>
	</main>
	
	<div id="div1"></div>


	<script src="./js/common.js?ver=20260616" type="text/javascript"></script>
	<script src="./js/data_salmon.js?ver=20260618" type="text/javascript"></script>
	<script src="./js/chart.js?ver=20260618" type="text/javascript"></script>
	<script>write_navigation()</script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</BODY>
</HTML>
